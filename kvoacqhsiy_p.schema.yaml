    states: [ дёӯж–Ү, гўҙж–Ү ]
  - name: full_shape
    reset: 0
    states: [ еҚҠеҜ¬, е…ЁеҜ¬ ]
  - name: simplification
    states: [ жјўеӯ—, жұүеӯ— ]
  - name: ascii_punct
    reset: 0
    states: [ гҖӮпјҢ, пјҺпјҢ ]

engine:
