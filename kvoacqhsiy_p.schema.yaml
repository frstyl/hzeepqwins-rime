quanpin:
  dictionary: luna_pinyin
  prism: luna_quanpin
  enable_completion: false
  prefix: ""
  # suffix: "'"
  tips: гҖ”quanpinгҖ•
  tag: quanpin
  # closing_tips:
  # # contextual_suggestions: 
  preedit_format:
    - xform/([nl])v/$1Гј/
    - xform/([nl])ue('|$)/$1Гјe$2/
    - xform/([jqxy])v/$1Гј/
  initial_quality: 0.5

pinyin_lookup:
  dictionary: luna_pinyin
  prism: luna_pinyin
  prefix: "`"
  suffix: "'"
  tips: гҖ”pinyinгҖ•
  tag: pinyin_lookup
  # closing_tips:
  # # contextual_suggestions: 
  preedit_format:
    - xform/([nl])v/$1Гј/
    - xform/([nl])ue('|$)/$1Гјe$2/
    - xform/([jqxy])v/$1Гј/

cangjie6_lookup:
  dictionary: cangjie6
  prism: cangjie6
  enable_charset_filter: false
  prefix: "~"
  suffix: "'"
  tips: гҖ”еҖүй Ў6гҖ•
  tag: cangjie6_lookup
  # closing_tips:
  preedit_format:
    - xlit|abcdefghijklmnopqrstuvwxyz|ж—ҘжңҲйҮ‘жңЁж°ҙзҒ«еңҹз«№жҲҲеҚҒеӨ§дёӯдёҖеј“дәәеҝғжүӢеҸЈе°ёе»ҝеұұеҘіз”°жӯўеҚңзүҮ|
  comment_format:
    - "xlit|abcdefghijklmnopqrstuvwxyz~|ж—ҘжңҲйҮ‘жңЁж°ҙзҒ«еңҹз«№жҲҲеҚҒеӨ§дёӯдёҖеј“дәәеҝғжүӢеҸЈе°ёе»ҝеұұеҘіз”°жӯўеҚңзүҮпҪһ|"

abc_segmentor: #ж··з”Ё
  extra_tags: [quanpin]

lookup:
  tags: [pinyin_lookup,cangjie6_lookup]
  dictionary: kvachqwins
  # overwrite_comment: true
  comment_format:
    - xform/-//
    - xform/_//
    - xform/;/Йҷ/
    - xform/,/КҢ/
punctuator:
  import_preset: symbols
menu:
  page_size:10
key_binder:
  import_preset: default
  bindings:
    - {accept: semicolon, send_sequence: "{Left}{apostrophe}{Right}", when: has_menu}
    - {accept: grave, send_sequence: "{Home}{grave}{End}", when: has_menu}
ascii_composer:
    good_old_caps_lock: true
    switch_key: {Caps_Lock: noop, Control_L: noop, Control_R: noop, Eisu_toggle: clear, Shift_L: commit_code, Shift_R: commit_code}

recognizer:
  import_preset: default
  patterns:
    email: "^[a-z][-_.0-9a-z]*@.*$"
    url: "^(www[.]|https?:|ftp:|mailto:).*$"
    # punct: '^/([0-9]0?|[A-Za-z]+)$' #й…ҚеҗҲsymbols.yamlдёӯзҡ„зү№ж®Ҡеӯ—з¬Ұијёе…Ҙ
    punct: "^/[0-9a-zA-Z]*$" #й…ҚеҗҲsymbols.yamlдёӯзҡ„зү№ж®Ҡеӯ—з¬Ұијёе…Ҙ
    # quanpin: "^[a-z]+'$"
    pinyin_lookup: "^`[a-z]*'?$"
    cangjie6_lookup: "^~[a-z]*'?$"
