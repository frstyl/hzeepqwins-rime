    - xform/(^|')tshJ/$1tɕh/
    - xform/(^|')(d?)zJ/$1$2ʑ/
    - xform/(^|')nJ/$1ȵ/
    - xform/(^|')(t?)sS/$1$2ʃ/
    - xform/(^|')tshS/$1tʃh/
    - xform/(^|')(d?)zS/$1$2ʒ/

    - xform/(^|')sR/$1ʂ/
    - xform/(^|')zR/$1ʐ/
    - xform/(^|')thR/$1ʈh/
    - xform/(^|')tR/$1ʈ/
    - xform/(^|')dR/$1ɖ/
    - xform/(^|')nR/$1ɳ/

    - xform/C/ŋ/
    - xform/;/ə/
    - xform/,/ʌ/
    # - xform/([rs])[ptk]($|')/$1/
  initial_quality: 0.7

quanpin:
  dictionary: luna_pinyin
  prism: luna_quanpin
  enable_completion: false
  prefix: ""
  # suffix: "'"
  tips: 〔quanpin〕
  tag: quanpin
  # closing_tips:
  # # contextual_suggestions: 
  preedit_format:
    - xform/([nl])v/$1ü/
    - xform/([nl])ue('|$)/$1üe$2/
    - xform/([jqxy])v/$1ü/
  initial_quality: 0.5

pinyin_lookup:
  dictionary: luna_pinyin
  prism: luna_pinyin
  prefix: "`"
  suffix: "'"
  tips: 〔pinyin〕
  tag: pinyin_lookup
  # closing_tips:
  # # contextual_suggestions: 
  preedit_format:
    - xform/([nl])v/$1ü/
    - xform/([nl])ue('|$)/$1üe$2/
    - xform/([jqxy])v/$1ü/

cangjie6_lookup:
  dictionary: cangjie6
  prism: cangjie6
  enable_charset_filter: false
  prefix: "~"
  suffix: "'"
  tips: 〔倉頡6〕
  tag: cangjie6_lookup
  # closing_tips:
  preedit_format:
    - xlit|abcdefghijklmnopqrstuvwxyz|日月金木水火土竹戈十大中一弓人心手口尸廿山女田止卜片|
  comment_format:
    - "xlit|abcdefghijklmnopqrstuvwxyz~|日月金木水火土竹戈十大中一弓人心手口尸廿山女田止卜片～|"

# abc_segmentor: #混用
  # extra_tags: [quanpin]

lookup:
  tags: [pinyin_lookup,cangjie6_lookup]
  dictionary: kvachqwins
  # overwrite_comment: true
  comment_format:
    - xform/-//
    - xform/_//
    - xform/;/ə/
    - xform/,/ʌ/
punctuator:
  import_preset: symbols
menu:
  page_size:10
key_binder:
  import_preset: default
  bindings:
ascii_composer:
    good_old_caps_lock: true
    switch_key: {Caps_Lock: noop, Control_L: noop, Control_R: noop, Eisu_toggle: clear, Shift_L: commit_code, Shift_R: commit_code}

recognizer:
  import_preset: default
  patterns:
    email: "^[a-z][-_.0-9a-z]*@.*$"
    url: "^(www[.]|https?:|ftp:|mailto:).*$"
    # punct: '^/([0-9]0?|[A-Za-z]+)$' #配合symbols.yaml中的特殊字符輸入
    punct: "^/[0-9a-zA-Z]*$" #配合symbols.yaml中的特殊字符輸入
    quanpin: "^[a-z]+'$"
    pinyin_lookup: "^`[a-z]*'?$"
    cangjie6_lookup: "^~[a-z]*'?$"
